<!DOCTYPE html>
<html>
<head lang="en">
  <meta charset="utf-8" />
  <title>Audio Output Swap</title>
  <script src="sdpi-components.js"></script>
  <style>
    .note { font-size: 0.85em; font-style: italic; color: var(--color-content-secondary, #969696); padding-left: 4px; }
  </style>
</head>
<body>
  <sdpi-item label="Device A">
    <sdpi-select setting="deviceAId" label-setting="deviceA" datasource="getDevices"
                 loading="Loading devices…" placeholder="Select a device" show-refresh></sdpi-select>
  </sdpi-item>

  <sdpi-item label="Device B">
    <sdpi-select setting="deviceBId" label-setting="deviceB" datasource="getDevices"
                 loading="Loading devices…" placeholder="Select a device" show-refresh></sdpi-select>
  </sdpi-item>

  <sdpi-item label="Pin app">
    <sdpi-textfield setting="pinApp" placeholder="Discord.exe (optional)"></sdpi-textfield>
  </sdpi-item>

  <sdpi-item>
    <aside class="note">Push or tap the dial to toggle the default output between A and B. Rotate for master volume.</aside>
  </sdpi-item>
</body>
</html>
